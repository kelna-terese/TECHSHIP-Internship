<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title><link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body><!-- Navbar -->

<nav class="navbar">

    <div class="logo">
        <h2>TaskFlow</h2>
    </div>

   <ul class="nav-links">

    <li>
        <a href="#">
            <i class="fas fa-home"></i>
        </a>
    </li>
<li>
        <a href="#">
            <i class="fas fa-user-circle"></i>
        </a>
    </li>
    <li>
        <a href="#tasks">Tasks</a>
    </li>
</ul>

    <button id="logoutBtn">
        Logout
    </button>

</nav>

<!-- Hero Section -->

<section class="hero">

    <h1 id="welcomeMessage">
        Welcome User
    </h1>

    <p>
        Manage your daily tasks efficiently and stay productive.
    </p>

</section>

<!-- Task Form -->

<section class="task-section">

    <h2>Add New Task</h2>

    <form id="taskForm">

        <input
            type="text"
            id="taskTitle"
            placeholder="Task Title"
        >

        <textarea
            id="taskDescription"
            placeholder="Task Description"
        ></textarea>

        <select id="taskStatus">

            <option value="Pending">
                Pending
            </option>

            <option value="In Progress">
                In Progress
            </option>

            <option value="On Hold">
                On Hold
            </option>

            <option value="Completed">
                Completed
            </option>

        </select>

        <button type="submit">
            Add Task
        </button>

    </form>

</section>

<!-- Search and Filter -->

<section class="controls">

    <input
        type="text"
        id="searchInput"
        placeholder="Search Tasks..."
    >

    <select id="filterStatus">

        <option value="All">
            All Tasks
        </option>

        <option value="Pending">
            Pending
        </option>

        <option value="In Progress">
            In Progress
        </option>

        <option value="On Hold">
            On Hold
        </option>

        <option value="Completed">
            Completed
        </option>

    </select>

</section>

<!-- Task List -->

<section id="tasks">

    <h2>Your Tasks</h2>

    <div id="taskContainer">

        <!-- Tasks will appear here dynamically -->

    </div>

</section>

<!-- Toast Notification -->

<div id="toast"></div>

<script src="js/storage.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
